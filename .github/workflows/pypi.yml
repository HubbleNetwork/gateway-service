name: Publish to PyPI

# Builds the hubble-gateway-service sdist + wheel and publishes them to PyPI.
#
# Triggers:
#   - push tag v*: build, verify the tag matches the pyproject version, publish.
#   - workflow_dispatch: build + validate only (no publish) for a dry run.
#
# Publishing uses PyPI Trusted Publishing (OIDC), so no API token is stored in
# the repo. One-time setup on PyPI: add a trusted publisher for this project
# pointing at owner=HubbleNetwork, repo=gateway-service, workflow=pypi.yml,
# environment=pypi (https://docs.pypi.org/trusted-publishers/).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches pyproject version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PYPROJECT_VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "pyproject version: ${PYPROJECT_VERSION}"
          echo "tag version:       ${TAG_VERSION}"
          if [ "${PYPROJECT_VERSION}" != "${TAG_VERSION}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match pyproject version ${PYPROJECT_VERSION}. Bump the version in pyproject.toml or fix the tag."
            exit 1
          fi

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Validate distributions
        run: |
          python -m pip install --upgrade twine
          twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Only publish for tag pushes; workflow_dispatch is a build/validate dry run.
    if: startsWith(github.ref, 'refs/tags/')
    environment:
      name: pypi
      url: https://pypi.org/p/hubble-gateway-service
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
