name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 0.1.0)"
        required: true

permissions:
  contents: write

env:
  PYAPP_PROJECT_NAME: hubble-gateway-service
  PYAPP_PROJECT_VERSION: ${{ github.event.inputs.version || github.ref_name }}
  PYAPP_PROJECT_FEATURES: ""
  PYAPP_EXEC_SPEC: "hubble_gateway_service.cli:main"
  PYAPP_PYTHON_VERSION: "3.12"
  PYAPP_DISTRIBUTION_EMBED: "1"
  PYAPP_FULL_ISOLATION: "1"
  PYAPP_SELF_COMMAND: "self"
  PYAPP_UV_ENABLED: "1"

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            artifact: hubble-gateway-x86_64-linux
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            artifact: hubble-gateway-aarch64-linux

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu

      - name: Download PyApp source
        run: |
          curl -fsSL https://github.com/ofek/pyapp/releases/latest/download/source.tar.gz -o pyapp-source.tar.gz
          tar -xzf pyapp-source.tar.gz
          mv pyapp-v* pyapp-build

      - name: Strip v prefix from version
        run: |
          VERSION="${PYAPP_PROJECT_VERSION}"
          VERSION="${VERSION#v}"
          echo "PYAPP_PROJECT_VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Build binary
        working-directory: pyapp-build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          cargo build --release --target ${{ matrix.target }}
          mv target/${{ matrix.target }}/release/pyapp ../${{ matrix.artifact }}
          chmod +x ../${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create checksums
        working-directory: artifacts
        run: sha256sum hubble-gateway-* > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          # Binary releases must not steal GitHub's "latest" pointer from the
          # image releases (the README links to releases/latest image assets).
          # The RPi build pins the binary by exact version, not "latest".
          make_latest: false
          files: |
            artifacts/hubble-gateway-x86_64-linux
            artifacts/hubble-gateway-aarch64-linux
            artifacts/checksums.txt
